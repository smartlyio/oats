name: Auto Changeset

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  create-changeset:
    if: >-
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'no-release') &&
      (
        contains(github.event.pull_request.labels.*.name, 'patch') ||
        contains(github.event.pull_request.labels.*.name, 'minor') ||
        contains(github.event.pull_request.labels.*.name, 'major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Determine bump type
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Create changeset file
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          CHANGESET_ID="pr-${PR_NUMBER}"
          mkdir -p .changeset
          printf '%s\n' "---" "\"@smartlyio/oats\": ${BUMP_TYPE}" "---" "" "${PR_TITLE} (#${PR_NUMBER})" > ".changeset/${CHANGESET_ID}.md"

      - name: Commit and push changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git commit -m "chore: add changeset for PR #${{ github.event.pull_request.number }}"
          git push
