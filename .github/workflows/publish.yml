# Publish workflow — publishes all packages to npm after a version bump PR is merged.
#
# This is the second half of the two-step release process:
#   1. The Version workflow (version.yml) opens a PR with version bumps.
#   2. A team member reviews and merges the version bump PR.
#   3. This workflow detects the merge (by matching the commit message),
#      tags the release, and publishes all packages to npm.
#
# The actual publish logic lives in .github/scripts/publish-packages.sh.
# It is idempotent — already-published versions are skipped, so re-running
# after a partial failure only publishes what's missing.
#
# Required secrets: NPM_TOKEN.

name: Publish

on:
  push:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest

    # Only run when a version bump PR is merged. The Version workflow
    # creates commits with this prefix. Using 'contains' instead of
    # 'startsWith' so it works with all merge strategies (merge commit,
    # squash, rebase) — merge commits start with "Merge pull request..."
    # and the actual message appears in the body.
    if: ${{ contains(github.event.head_commit.message, 'chore: version packages') }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn ci:build

      - name: Tag release
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push --tags

      # Publish each package to npm. The script is idempotent — versions
      # already on the registry are skipped, so re-running after a partial
      # failure is safe.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./.github/scripts/publish-packages.sh
