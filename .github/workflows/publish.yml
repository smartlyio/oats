# Publish workflow — automated versioning and npm publishing.
#
# This workflow eliminates all manual release steps. Contributors only need to
# add a label (patch/minor/major) to their PR. After merge, this workflow:
#   1. Determines the version bump type from merged PR labels
#   2. Bumps all package versions using lerna (fixed mode — all packages
#      share the same version number, configured in lerna.json)
#   3. Commits the version bump directly to master
#   4. Publishes all packages to npm
#   5. Creates and pushes a git tag
#
# The PR label determines the bump type, and the PR titles are included
# in the version commit message as a lightweight release log.
#
# The default GITHUB_TOKEN cannot push to protected branches. This workflow
# uses the "smartlyio" GitHub App to generate a short-lived token that has
# permission to bypass branch protection on master. The app must be:
#   - Installed on this repository with Contents: Read & Write permission
#   - Listed in the master branch protection rule under "Allow specified
#     actors to bypass required pull requests"
# Required secrets: RELEASE_APP_ID, RELEASE_APP_PRIVATE_KEY (from the app).

name: Publish

on:
  push:
    branches: [master]

# Prevent concurrent runs. If multiple PRs are merged in quick succession,
# each triggered run will queue and execute in order, ensuring version bumps
# don't conflict with each other.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest

    # contents:write is needed for the default GITHUB_TOKEN (used by gh CLI).
    # The actual push to master uses the GitHub App token generated below.
    permissions:
      contents: write

    steps:
      # Generate a short-lived token from the "smartlyio" GitHub App.
      # This token can bypass branch protection rules on master, unlike
      # the default GITHUB_TOKEN which is intentionally blocked by GitHub.
      # The token expires after ~1 hour and is scoped to this repository only.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Checkout using the app token so that subsequent git push commands
      # authenticate as the GitHub App (which has bypass permissions).
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Full history is required to find the last "chore: version packages"
          # commit, which serves as the reference point for determining which
          # merged PRs still need to be included in a release.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          # registry-url must be set for npm publish authentication to work.
          # It configures .npmrc so that NODE_AUTH_TOKEN is used automatically.
          registry-url: "https://registry.npmjs.org"

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn ci:build

      # This step bridges the gap between "PR labels" and "lerna version".
      # Instead of asking developers to run any versioning commands, we
      # determine the bump type automatically from merged PR metadata.
      #
      # How it works:
      #   1. Find the last "chore: version packages" commit on master — this
      #      marks the boundary of the last release.
      #   2. Query the GitHub API for all PRs merged after that point.
      #   3. For each PR with a release label, record its bump type and title.
      #   4. The highest bump type wins (major > minor > patch).
      #   5. PR titles are saved for inclusion in the version commit message.
      #
      # If no qualifying PRs are found (e.g., only no-release PRs were merged),
      # the bump output is empty and all downstream steps are skipped.
      - name: Determine version bump from merged PRs
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the last version bump commit to use as the "since" boundary.
          # The grep pattern has no "$" anchor so it matches both old-style
          # commits and newer ones that include "[skip ci]" in the message.
          LAST_VERSION_SHA=$(git log --grep="^chore: version packages" -1 --format=%H)

          if [ -n "$LAST_VERSION_SHA" ]; then
            SINCE_DATE=$(git log -1 --format=%aI "$LAST_VERSION_SHA")
            echo "Last version commit: $(git log -1 --oneline "$LAST_VERSION_SHA")"
            echo "Looking for PRs merged after: $SINCE_DATE"
          else
            SINCE_DATE="2000-01-01T00:00:00Z"
            echo "No version commits found — scanning all merged PRs"
          fi

          PRS=$(gh pr list --state merged --base master --limit 100 \
            --json number,title,labels,mergedAt)

          FILTERED=$(echo "$PRS" | jq -c --arg since "$SINCE_DATE" \
            '[.[] | select(.mergedAt > $since)]')

          COUNT=$(echo "$FILTERED" | jq 'length')
          echo "Found $COUNT merged PR(s) since last version"

          BUMP=""
          rm -f /tmp/pr-entries.txt
          NUMBERS=$(echo "$FILTERED" | jq -r '.[].number')

          for NUMBER in $NUMBERS; do
            PR=$(echo "$FILTERED" | jq -c ".[] | select(.number == $NUMBER)")
            TITLE=$(echo "$PR" | jq -r '.title')
            LABEL_NAMES=$(echo "$PR" | jq -r '[.labels[].name] | join(" ")')

            # Skip automated version bump commits to avoid infinite loops.
            if echo "$TITLE" | grep -q "^chore: version packages"; then
              echo "  skip (version commit): #$NUMBER"
              continue
            fi

            if echo "$LABEL_NAMES" | grep -q "no-release"; then
              echo "  skip (no-release): #$NUMBER — $TITLE"
              continue
            fi

            PR_BUMP=""
            if echo "$LABEL_NAMES" | grep -q "major"; then PR_BUMP="major"
            elif echo "$LABEL_NAMES" | grep -q "minor"; then PR_BUMP="minor"
            elif echo "$LABEL_NAMES" | grep -q "patch"; then PR_BUMP="patch"
            fi

            if [ -z "$PR_BUMP" ]; then
              echo "  skip (no release label): #$NUMBER — $TITLE"
              continue
            fi

            # Track the highest bump type across all PRs.
            if [ "$PR_BUMP" = "major" ]; then
              BUMP="major"
            elif [ "$PR_BUMP" = "minor" ] && [ "$BUMP" != "major" ]; then
              BUMP="minor"
            elif [ "$PR_BUMP" = "patch" ] && [ -z "$BUMP" ]; then
              BUMP="patch"
            fi

            echo "- ${TITLE} (#${NUMBER})" >> /tmp/pr-entries.txt
            echo "  included ($PR_BUMP): #$NUMBER — $TITLE"
          done

          echo ""
          echo "Resolved bump type: ${BUMP:-none}"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      # Use lerna's fixed versioning mode to bump ALL packages to the same
      # new version. The --no-git-tag-version flag prevents lerna from
      # committing or tagging — we handle that ourselves in the next step
      # so we can add [skip ci] to the commit message.
      # --force-publish ensures every package is included even if it has
      # no direct code changes (important for the fixed version strategy).
      #
      # Running via `yarn lerna` ensures we use the project's local lerna
      # (pinned in package.json) rather than a globally installed version,
      # which may be incompatible.
      - name: Version packages
        if: steps.bump.outputs.bump != ''
        run: |
          yarn lerna version ${{ steps.bump.outputs.bump }} \
            --yes \
            --force-publish \
            --no-git-tag-version \
            --no-push

      # Commit version bumps directly to master. The "[skip ci]" marker in the
      # commit message prevents this push from triggering another workflow run,
      # which would otherwise cause an infinite loop.
      # The commit body includes PR titles as a lightweight release log —
      # this makes `git log` useful for understanding what each release contains.
      #
      # The git push authenticates as the "smartlyio" GitHub App (via the
      # token used in actions/checkout), which has permission to bypass
      # the branch protection rules on master.
      - name: Commit and tag
        if: steps.bump.outputs.bump != ''
        run: |
          VERSION=$(node -p "require('./lerna.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          BODY=""
          if [ -f /tmp/pr-entries.txt ]; then
            BODY=$(cat /tmp/pr-entries.txt)
          fi

          git commit -m "chore: version packages v${VERSION} [skip ci]" -m "$BODY"
          git tag "v${VERSION}"
          git push
          git push --tags

      # Publish all packages to npm. This step runs unconditionally because
      # `lerna publish from-package` is idempotent — it checks each package's
      # version against the npm registry and only publishes versions that don't
      # exist yet. This makes it safe to re-run the workflow if a previous run
      # failed mid-publish (e.g., 4 of 8 packages published before a timeout).
      - name: Publish to npm
        run: yarn lerna publish from-package --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
