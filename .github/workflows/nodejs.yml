# CI workflow — builds, lints, and tests the project.
#
# Runs on both pull requests (to validate changes before merge) and pushes
# to master (to verify the integrated result). This ensures that the code
# on master is always in a known-good state before the Publish workflow
# attempts to release it.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    # Read-only access is sufficient — this workflow never pushes commits.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm ci:build
      - name: Lint
        run: pnpm ci:lint
      - name: Test
        run: pnpm ci:test
