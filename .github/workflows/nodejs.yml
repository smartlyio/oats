name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install yarn
        run: npm install -g yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Sync changeset config
        run: |
          node scripts/sync-changeset-config.js
          if git diff --quiet .changeset/config.json; then
            echo "No changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .changeset/config.json
            git commit -m "chore: sync changeset config with workspace packages"
            git push
          fi
      - name: Build
        run: yarn ci:build
      - name: Lint
        run: yarn ci:lint
      - name: Test
        run: yarn ci:test
