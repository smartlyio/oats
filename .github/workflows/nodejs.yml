# CI workflow — builds, lints, and tests the project.
#
# Runs on both pull requests (to validate changes before merge) and pushes
# to master (to verify the integrated result). This ensures that the code
# on master is always in a known-good state before the Publish workflow
# attempts to release it.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    # Read-only access is sufficient — this workflow never pushes commits.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install yarn
        run: npm install -g yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Verify that .changeset/config.json lists all workspace packages in
      # the "fixed" version group. If a new package is added (or removed)
      # without updating the config, this step fails with instructions on
      # how to fix it. The Publish workflow auto-fixes this as a safety net,
      # but catching it here gives earlier feedback to contributors.
      - name: Verify changeset config
        run: node scripts/sync-changeset-config.js --check

      - name: Build
        run: yarn ci:build
      - name: Lint
        run: yarn ci:lint
      - name: Test
        run: yarn ci:test
