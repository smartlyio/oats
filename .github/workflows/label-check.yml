# Release label check — the primary gate for the release process.
#
# Every PR to master must have exactly one release label:
#   - patch  → bug fixes, small non-breaking changes
#   - minor  → new features, non-breaking additions
#   - major  → breaking changes
#   - no-release → changes that should not trigger a release (docs, CI, etc.)
#
# This label drives the release automation. After merge, the Version
# workflow (version.yml) reads the label to determine the version bump
# type and opens a version bump PR. No other action is required from
# contributors beyond reviewing and merging that PR.
#
# The check re-runs on label changes (labeled/unlabeled) so contributors
# get immediate feedback when they add or remove labels.

name: Release Label Check

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
    branches: [master]

jobs:
  check-label:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          HAS_PATCH=$(echo "$LABELS" | grep -c '"patch"' || true)
          HAS_MINOR=$(echo "$LABELS" | grep -c '"minor"' || true)
          HAS_MAJOR=$(echo "$LABELS" | grep -c '"major"' || true)
          HAS_NO_RELEASE=$(echo "$LABELS" | grep -c '"no-release"' || true)

          COUNT=$((HAS_PATCH + HAS_MINOR + HAS_MAJOR))

          # Combining no-release with a version label is contradictory and
          # likely a mistake — fail early to avoid confusion.
          if [ "$HAS_NO_RELEASE" -gt 0 ] && [ "$COUNT" -gt 0 ]; then
            echo "::error::Cannot combine 'no-release' with a version label (patch/minor/major)."
            exit 1
          fi

          if [ "$HAS_NO_RELEASE" -gt 0 ]; then
            echo "Skipping release — 'no-release' label is set."
            exit 0
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Missing release label. Add one of: patch, minor, major, or no-release."
            exit 1
          fi

          # Multiple version labels would make the bump type ambiguous.
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple version labels found. Use exactly one of: patch, minor, major."
            exit 1
          fi

          echo "Release label check passed."
